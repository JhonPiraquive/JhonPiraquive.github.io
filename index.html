<!DOCTYPE html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alejandro Piraquive</title>
</head>
<body>
<script>
  (function () {
    var lang = (navigator.language || navigator.browserLanguage || 'en').split('-')[0].toLowerCase();
    var supported = ['en', 'es'];
    var target = supported.indexOf(lang) !== -1 ? lang : 'en';
    window.location.replace('pages/index-' + target + '.html');
  })();
</script>
</body>
</html>
