<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Landing</title>

  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: linear-gradient(135deg, #e0f7ff, #e6fff5);
      --card-bg: rgba(255,255,255,0.7);
      --primary: #0ea5e9;
      --secondary: #10b981;
      --text: #0f172a;
      --subtext: #475569;
      --border: rgba(255,255,255,0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "DM Sans", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    header {
      text-align: center;
      padding: 80px 20px 40px;
    }

    h1 {
      font-family: "Syne", sans-serif;
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    p {
      color: var(--subtext);
      font-size: 1.1rem;
    }

    .grid {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(14,165,233,0.15), transparent);
      opacity: 0;
      transition: 0.4s;
    }

    .card:hover::before {
      opacity: 1;
    }

    .icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      font-size: 20px;
      font-weight: bold;
    }

    .card h3 {
      font-size: 1.3rem;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 0.95rem;
      margin-bottom: 15px;
    }

    .cta {
      display: flex;
      align-items: center;
      font-weight: 600;
      color: var(--primary);
      transition: 0.3s;
    }

    .card:hover .cta {
      transform: translateX(5px);
    }
  </style>
</head>

<body>

<header>
  <h1>¡Expande tu mente!</h1>
  <p>Descubre y aprende algo nuevo.</p>
</header>

<main class="grid" id="grid"></main>

<script>
  const data = [
    { title: "Programación básica para entornos web", desc: "JavaScript: DOM, variables, control de flujo, funciones, arrays, objetos, asincronía, fetch. Material con diagramas, tema claro y proyectos opcionales (calculadora, tareas, RPS, ajedrez).", url: "./pbpew/index.html", icon: "📗" },
    { title: "Programación Orientada a Sitios Web", desc: "Servicios Web, Formatos de Datos, Protocolos de Seguridad, Metodos HTTP, Tipos de Servicios Web, APIS, Tokens, Frontend, Backend, Cache, Http Headers, Principios REST, Typescript, Angular, React, Modelo Cliente - Servidor, Herramientas de Desarrollo, Bases de Datos, Principios Solid, Naming Conventions, IA  en Desarrollo Web.", url: "./posw/servicios-web.html", icon: "👨‍💻" },
    { title: "Programación Orientada a Objetos", desc: "Fundamentos, encapsulamiento, herencia, asociación, agregación y composición, abstracción e interfaces, polimorfismo, override y sobrecarga, diagramas de clases, principios SOLID, modularidad y cohesión.", url: "./poo/index.html", icon: "🧩" },
    { title: "Seguridad en aplicaciones", desc: "ISO 27001/27002, CIA + autenticidad, ingeniería social y phishing, HTTPS y MITM, SQLi y mitigación, Base64 vs cifrado vs hash (SHA-256), cookies seguras, JWT y programación segura en PHP (excepciones, logs, configuración).", url: "./sea/index.html", icon: "🛡️" },
  ];

  const grid = document.getElementById("grid");

  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.onclick = () => window.location.href = item.url;

    card.innerHTML = `
      <div class="icon">${item.icon}</div>
      <h3>${item.title}</h3>
      <p>${item.desc}</p>
      <div class="cta">Visitar →</div>
    `;

    grid.appendChild(card);
  });
</script>

</body>
</html>
