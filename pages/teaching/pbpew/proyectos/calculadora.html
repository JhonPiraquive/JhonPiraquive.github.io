<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto · Calculadora | PBPEW</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Raleway:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../pbpew-theme.css" />
  <link rel="stylesheet" href="proyectos-theme.css" />
</head>
<body>
  <header class="site-header">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span class="logo"><a href="../index.html">PBPEW</a>
      <span>Calculadora</span></span>
    </div>
    <nav class="site-nav">
      <a href="../index.html">Índice del curso</a>
    </nav>
  </header>

  <section id="hero" style="min-height:28vh">
    <div class="hero-inner reveal">
      <span class="badge-tema">Proyecto</span>
      <h1 class="hero-title">Calculadora interactiva</h1>
      <p class="hero-sub">Variables, operadores, DOM y eventos. El cálculo evita <code>eval()</code> y usa operaciones explícitas.</p>
    </div>
  </section>

  <main class="pbpew-content section-alt">
    <div class="project-wrap reveal" id="calc-app">
      <h2>Pantalla</h2>
      <div class="calc-grid" aria-label="Calculadora">
        <div class="calc-display" id="display" aria-live="polite">0</div>
        <button type="button" data-act="clear">C</button>
        <button type="button" data-act="history">Hist</button>
        <button type="button" data-op="/">/</button>
        <button type="button" data-op="*">×</button>
        <button type="button" data-digit="7">7</button>
        <button type="button" data-digit="8">8</button>
        <button type="button" data-digit="9">9</button>
        <button type="button" data-op="-">−</button>
        <button type="button" data-digit="4">4</button>
        <button type="button" data-digit="5">5</button>
        <button type="button" data-digit="6">6</button>
        <button type="button" data-op="+">+</button>
        <button type="button" data-digit="1">1</button>
        <button type="button" data-digit="2">2</button>
        <button type="button" data-digit="3">3</button>
        <button type="button" data-act="equals" style="grid-row: span 2">=</button>
        <button type="button" data-digit="0" style="grid-column: span 2">0</button>
        <button type="button" data-digit=".">.</button>
      </div>
      <p id="hist-panel" style="margin-top:12px;font-size:0.9rem;color:var(--muted);min-height:3em"></p>
    </div>
  </main>

  <footer class="site-footer">PBPEW · Proyecto calculadora</footer>

  <script>
    (function () {
      const display = document.getElementById("display");
      const histPanel = document.getElementById("hist-panel");
      let current = "0";
      let stored = null;
      let pendingOp = null;
      let fresh = true;
      const history = [];

      function updateDisplay() {
        display.textContent = current;
      }

      function applyOp(a, b, op) {
        const x = parseFloat(a);
        const y = parseFloat(b);
        switch (op) {
          case "+":
            return x + y;
          case "-":
            return x - y;
          case "*":
            return x * y;
          case "/":
            return y === 0 ? NaN : x / y;
          default:
            return y;
        }
      }

      function digit(d) {
        if (fresh) {
          current = d === "." ? "0." : d;
          fresh = false;
        } else {
          if (d === "." && current.includes(".")) return;
          current = current === "0" && d !== "." ? d : current + d;
        }
        updateDisplay();
      }

      function op(nextOp) {
        const num = parseFloat(current);
        if (stored === null || pendingOp === null) {
          stored = num;
        } else if (!fresh) {
          const res = applyOp(String(stored), current, pendingOp);
          stored = res;
          current = String(Number.isFinite(res) ? res : 0);
          updateDisplay();
        }
        pendingOp = nextOp;
        fresh = true;
      }

      function equals() {
        if (pendingOp === null || stored === null) return;
        const res = applyOp(String(stored), current, pendingOp);
        const line = `${stored} ${pendingOp} ${current} = ${res}`;
        history.unshift(line);
        if (history.length > 8) history.pop();
        stored = null;
        pendingOp = null;
        current = String(Number.isFinite(res) ? res : 0);
        fresh = true;
        updateDisplay();
      }

      function clearAll() {
        current = "0";
        stored = null;
        pendingOp = null;
        fresh = true;
        updateDisplay();
      }

      document.getElementById("calc-app").addEventListener("click", function (e) {
        const t = e.target.closest("button");
        if (!t) return;
        if (t.dataset.digit != null) digit(t.dataset.digit);
        else if (t.dataset.op) op(t.dataset.op);
        else if (t.dataset.act === "equals") equals();
        else if (t.dataset.act === "clear") clearAll();
        else if (t.dataset.act === "history") {
          histPanel.textContent = history.length ? history.join(" · ") : "(sin historial todavía)";
        }
      });

      document.addEventListener("keydown", function (e) {
        if (e.key >= "0" && e.key <= "9") digit(e.key);
        else if (e.key === ".") digit(".");
        else if (e.key === "+") op("+");
        else if (e.key === "-") op("-");
        else if (e.key === "*") op("*");
        else if (e.key === "/") op("/");
        else if (e.key === "Enter" || e.key === "=") {
          e.preventDefault();
          equals();
        } else if (e.key === "Escape") clearAll();
      });
    })();
  </script>
  <script src="../pbpew.js"></script>
</body>
</html>
