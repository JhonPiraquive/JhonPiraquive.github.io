<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto · Lista de tareas | PBPEW</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Raleway:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../pbpew-theme.css" />
  <link rel="stylesheet" href="proyectos-theme.css" />
</head>
<body>
  <header class="site-header">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span class="logo"><a href="../index.html">PBPEW</a>
      <span>To-Do</span></span>
    </div>
    <nav class="site-nav"><a href="../index.html">Índice del curso</a></nav>
  </header>

  <section id="hero" style="min-height:26vh">
    <div class="hero-inner reveal">
      <span class="badge-tema">Proyecto</span>
      <h1 class="hero-title">Lista de tareas</h1>
      <p class="hero-sub">Arrays, objetos, <code>map</code>, eventos y <code>localStorage</code>.</p>
    </div>
  </section>

  <main class="pbpew-content section-alt">
    <div class="project-wrap reveal">
      <form id="todo-form">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input id="todo-input" type="text" placeholder="Escribe una tarea…" required aria-label="Nueva tarea"
            style="flex:1;min-width:200px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);font-family:inherit" />
          <button type="submit" class="btn-primary-custom" style="border:none">Agregar</button>
        </div>
      </form>
      <div class="filter-bar" style="margin-top:16px" role="group" aria-label="Filtros">
        <button type="button" data-filter="all" class="active">Todas</button>
        <button type="button" data-filter="pending">Pendientes</button>
        <button type="button" data-filter="done">Completadas</button>
      </div>
      <ul id="todo-list" style="list-style:none;padding:0;margin-top:16px"></ul>
    </div>
  </main>

  <footer class="site-footer">PBPEW · Proyecto lista de tareas</footer>

  <script>
    (function () {
      const STORAGE_KEY = "pbpew-todos-v1";
      const form = document.getElementById("todo-form");
      const input = document.getElementById("todo-input");
      const list = document.getElementById("todo-list");
      let filter = "all";
      /** @type {{id:string,text:string,done:boolean}[]} */
      let tasks = [];

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          tasks = raw ? JSON.parse(raw) : [];
        } catch {
          tasks = [];
        }
      }

      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      }

      function visible(t) {
        if (filter === "pending") return !t.done;
        if (filter === "done") return t.done;
        return true;
      }

      function render() {
        const filtered = tasks.filter(visible);
        list.innerHTML = filtered
          .map(
            (t) => `
          <li class="todo-item ${t.done ? "done" : ""}" data-id="${t.id}">
            <input type="checkbox" ${t.done ? "checked" : ""} aria-label="Completada" />
            <span class="label" style="flex:1">${escapeHtml(t.text)}</span>
            <button type="button" aria-label="Eliminar" style="border:none;background:transparent;cursor:pointer;color:var(--accent2);font-size:1.1rem">✕</button>
          </li>`
          )
          .join("");

        list.querySelectorAll(".todo-item").forEach((row) => {
          const id = row.getAttribute("data-id");
          row.querySelector("input[type=checkbox]").addEventListener("change", function () {
            const task = tasks.find((x) => x.id === id);
            if (task) {
              task.done = this.checked;
              save();
              render();
            }
          });
          row.querySelector("button").addEventListener("click", function () {
            tasks = tasks.filter((x) => x.id !== id);
            save();
            render();
          });
        });
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        tasks.push({
          id: String(Date.now()),
          text,
          done: false,
        });
        input.value = "";
        save();
        render();
      });

      document.querySelectorAll(".filter-bar button").forEach((btn) => {
        btn.addEventListener("click", function () {
          filter = btn.getAttribute("data-filter") || "all";
          document.querySelectorAll(".filter-bar button").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          render();
        });
      });

      load();
      render();
    })();
  </script>
  <script src="../pbpew.js"></script>
</body>
</html>
